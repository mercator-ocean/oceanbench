name: Evaluate challenger
on:
  workflow_dispatch:
    inputs:
      challengerPythonFileName:
        description: 'Challenger python file name in the "challenger_datasets" directory without ".py" extension'
        required: true
        type: string
jobs:
  evaluate-challenger:
    runs-on: self-hosted
    timeout-minutes: 120
    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
      - uses: mamba-org/setup-micromamba@v1
        with:
          micromamba-version: '1.5.6-0'
          micromamba-binary-path: ${{ runner.temp }}/bin/micromamba
          environment-file: conda_environment_test.yaml
          environment-name: oceanbench_evaluate_challenger_${{ github.ref_name }}_${{ github.sha }}
          condarc-file: .condarc
          cache-environment: true
          post-cleanup: 'all'
      - name: Evaluate challenger
        env:
          COPERNICUSMARINE_SERVICE_USERNAME: ${{ secrets.COPERNICUSMARINE_SERVICE_USERNAME }}
          COPERNICUSMARINE_SERVICE_PASSWORD: ${{ secrets.COPERNICUSMARINE_SERVICE_PASSWORD }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_S3_ENDPOINT: ${{ secrets.AWS_S3_ENDPOINT }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_DEFAULT_REGION }}
          CHALLENGER_PYTHON_FILE_PATH: challenger_datasets/${{ inputs.challengerPythonFileName  }}.py
          TEST_ENVIRONMENT_NAME: oceanbench_evaluate_challenger_${{ github.ref_name }}_${{ github.sha }}
        run: make evaluate-challenger
        shell: micromamba-shell {0}
      - name: Package report
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_S3_ENDPOINT: ${{ secrets.AWS_S3_ENDPOINT }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_DEFAULT_REGION }}
          TEST_ENVIRONMENT_NAME: oceanbench_evaluate_challenger_${{ github.ref_name }}_${{ github.sha }}
        run: |
          make package-evaluation-reports \
            REPORT_NOTEBOOKS=${{ inputs.challengerPythonFileName }}.global.report.ipynb \
            REPORT_PACKAGE_DIRECTORY=evaluation-report-package \
            REPORT_PACKAGE_UPLOAD_OPTIONS="--s3-bucket project-oceanbench --s3-prefix dev/evaluation-reports/249-webp-demo"
        shell: micromamba-shell {0}
