project:
  type: website
website:
  title: "OceanBench"
  favicon: favicon-light.png
  open-graph: true
  navbar:
    logo: https://minio.dive.edito.eu/project-oceanbench/public/logo/favicon-light.png
    logo-alt: "OceanBench logo."
    left:
      - href: index.qmd
        text: Scores
